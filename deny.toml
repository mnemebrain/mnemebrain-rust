# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Only consider dependencies for the host target triple, not cross-compilation
# targets. Remove or expand this list if you cross-compile.
targets = []

# ----------------------------------------------------------------------------
# Licenses
# ----------------------------------------------------------------------------
[licenses]
# Confidence threshold required before a license is accepted (0.0–1.0).
confidence-threshold = 0.8

# Licenses that are unconditionally allowed.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "Zlib",
  "Unicode-3.0",
]

# ----------------------------------------------------------------------------
# Bans — duplicate crates and specific crate policies
# ----------------------------------------------------------------------------
[bans]
# Lint level for when multiple versions of the same crate are detected.
multiple-versions = "warn"

# Deny the use of `unsafe` code (advisory only — this is a lint hint).
deny = []

# Crates that are always denied, regardless of version.
# deny = [{ name = "openssl", reason = "prefer rustls" }]

# ----------------------------------------------------------------------------
# Advisories — RustSec advisory database
# ----------------------------------------------------------------------------
[advisories]
# The url(s) of the advisory databases to use.
db-urls = ["https://github.com/rustsec/advisory-db"]

# Crate advisories to ignore (by RUSTSEC id).
ignore = []

# ----------------------------------------------------------------------------
# Sources — registries and git sources
# ----------------------------------------------------------------------------
[sources]
# Lint level for crates from unknown registries.
unknown-registry = "deny"

# Lint level for crates from unknown git sources.
unknown-git = "deny"

# Allow crates.io as the default registry.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
